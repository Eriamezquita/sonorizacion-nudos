name: Pylint

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  pylint:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          pip install pylint

      - name: Check Python syntax
        run: |
          PYTHONPATH=src python -m compileall src examples tests

      - name: Run Pylint report
        run: |
          PYTHONPATH=src pylint --disable=C0114,C0115,C0116,R0903 --exit-zero src examples tests
